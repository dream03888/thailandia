<div class="countries-container">
  <div class="page-header">
    <h1 class="page-title"><i class="fa-solid fa-globe"></i> Manage Countries</h1>
  </div>

  <div class="content-grid">
    <!-- Form Section -->
    <div class="form-section card">
      <h2 class="section-title">
        <i class="fa-solid" [class.fa-plus]="!editId()" [class.fa-pen-to-square]="editId()"></i>
        {{ editId() ? 'Edit Country' : 'Add New Country' }}
      </h2>
      <form [formGroup]="countryForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Country Name *</label>
          <input type="text" formControlName="name" placeholder="e.g. Thailand">
        </div>
        <div class="form-group">
          <label>Country Code</label>
          <input type="text" formControlName="code" placeholder="e.g. TH">
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" (click)="resetForm()" *ngIf="editId()">Cancel</button>
          <button type="submit" class="btn-primary" [disabled]="countryForm.invalid || isSaving()">
            <i class="fa-solid fa-floppy-disk" *ngIf="!isSaving()"></i>
            <i class="fa-solid fa-spinner fa-spin" *ngIf="isSaving()"></i>
            {{ editId() ? 'Update Country' : 'Save Country' }}
          </button>
        </div>
      </form>
    </div>

    <!-- List Section -->
    <div class="list-section card">
      <h2 class="section-title"><i class="fa-solid fa-list"></i> Country List</h2>
      <div class="table-responsive">
        <table class="countries-table">
          <thead>
            <tr>
              <th>NAME</th>
              <th>CODE</th>
              <th>ACTIONS</th>
            </tr>
          </thead>
          <tbody>
            @for (country of countries(); track country.id) {
              <tr>
                <td><strong>{{ country.name }}</strong></td>
                <td>{{ country.code || '-' }}</td>
                <td>
                  <div class="action-btns">
                    <button class="btn-edit" (click)="onEdit(country)" title="Edit">
                      <i class="fa-solid fa-pen"></i>
                    </button>
                    <button class="btn-delete" (click)="onDelete(country.id)" title="Delete">
                      <i class="fa-solid fa-trash"></i>
                    </button>
                  </div>
                </td>
              </tr>
            } @empty {
              <tr>
                <td colspan="3" class="empty-state">No countries found</td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
