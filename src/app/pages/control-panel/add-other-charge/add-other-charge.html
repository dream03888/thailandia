<div class="add-other-charge-container">
  <main class="main-content">
    <div class="page-header">
      <button class="btn-back" (click)="goBack()">
        <i class="fa-solid fa-arrow-left"></i> {{ t()['form.back'] || 'Back' }}
      </button>
      <h1 class="page-title">{{ t()['charge.createTitle'] || 'Add Other Charge' }}</h1>
    </div>

    <form class="charge-form" [formGroup]="chargeForm">
      
      <!-- Charge Information Section -->
      <section class="form-section">
        <h2 class="section-title"><i class="fa-solid fa-circle-info"></i> {{ t()['form.generalInfo'] || 'General Information' }}</h2>
        
        <div class="form-row">
          <div class="form-group full-width">
            <label>{{ t()['charge.description'] || 'Description' }} <span class="required">*</span></label>
            <input type="text" formControlName="description" [placeholder]="t()['charge.placeholder.description'] || 'Enter charge description'">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group half-width">
            <label>{{ t()['charge.amount'] || 'Amount' }} <span class="required">*</span></label>
            <input type="number" formControlName="amount" [placeholder]="t()['charge.placeholder.amount'] || 'Enter amount'">
          </div>
          <div class="form-group half-width">
            <label>{{ t()['charge.type'] || 'Charge Type' }} <span class="required">*</span></label>
            <select formControlName="type">
              <option value="" disabled selected>{{ t()['charge.placeholder.type'] || 'Select charge type' }}</option>
              <option value="Per Pax">{{ t()['charge.type.perPax'] || 'Per Pax' }}</option>
              <option value="Per Booking">{{ t()['charge.type.perBooking'] || 'Per Booking' }}</option>
            </select>
          </div>
        </div>
      </section>

      <div class="bottom-spacer"></div>

      <div class="sticky-footer">
        <button type="button" class="btn-cancel" (click)="goBack()">
          <i class="fa-solid fa-xmark"></i> {{ t()['form.cancel'] || 'Cancel' }}
        </button>
        <button type="button" class="btn-save" (click)="saveCharge()">
          <i class="fa-solid fa-plus"></i> {{ t()['charge.btnSave'] || 'Add Charge' }}
        </button>
      </div>
    </form>
  </main>
</div>
