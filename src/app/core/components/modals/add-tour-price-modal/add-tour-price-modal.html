<div class="modal-overlay" [class.open]="isOpen()" (click)="handleClose()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3 class="modal-title font-bold text-white">{{ t()['tour.modalPriceTitle'] || 'Add Tour Price' }}</h3>
      <button class="btn-close" (click)="handleClose()"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <form class="modal-body" [formGroup]="priceForm" (ngSubmit)="handleSave()">
      <div class="form-row">
        <div class="form-group full-width">
          <label>{{ t()['tour.startDate'] || 'Start Date' }} <span class="required">*</span></label>
          <input type="date" formControlName="startDate">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group full-width">
          <label>{{ t()['tour.endDate'] || 'End Date' }} <span class="required">*</span></label>
          <input type="date" formControlName="endDate">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group full-width">
          <label>{{ t()['tour.pax'] || 'Pax' }} <span class="required">*</span></label>
          <input type="number" formControlName="pax" [placeholder]="t()['tour.placeholder.pax'] || 'Enter Number of Passengers'">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group full-width">
          <label>{{ t()['tour.singlePrice'] || 'Single Price' }} <span class="required">*</span></label>
          <input type="number" formControlName="singlePrice" [placeholder]="t()['tour.placeholder.price'] || 'Enter Single Price'">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group full-width">
          <label>{{ t()['tour.doublePrice'] || 'Double Price' }} <span class="required">*</span></label>
          <input type="number" formControlName="doublePrice" [placeholder]="t()['tour.placeholder.price'] || 'Enter Double Price'">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group full-width">
          <label>{{ t()['tour.triplePrice'] || 'Triple Price' }} <span class="required">*</span></label>
          <input type="number" formControlName="triplePrice" [placeholder]="t()['tour.placeholder.price'] || 'Enter Triple Price'">
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-modal-cancel" (click)="handleClose()">{{ t()['form.cancel'] || 'Cancel' }}</button>
        <button type="submit" class="btn-modal-save">{{ t()['form.save'] || 'Save' }}</button>
      </div>
    </form>
  </div>
</div>
