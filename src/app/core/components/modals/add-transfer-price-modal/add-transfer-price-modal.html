@if (isOpen()) {
<div class="modal-overlay" (click)="onCancel()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">{{ modalTitle() }}</h2>
      <button class="btn-close" (click)="onCancel()">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <form [formGroup]="priceForm" (ngSubmit)="onSave()" class="modal-body">
        <div class="form-group">
          <label>{{ t()['transfer.colDateFrom'] || 'Date From' }} *</label>
          <app-date-input formControlName="dateFrom" />
        </div>
        <div class="form-group">
          <label>{{ t()['transfer.colDateTo'] || 'Date To' }} *</label>
          <app-date-input formControlName="dateTo" />
        </div>

      <div class="form-group">
        <label>{{ t()['transfer.colPax'] || 'Pax' }} *</label>
        <input type="number" formControlName="pax" [class.error]="priceForm.get('pax')?.touched && priceForm.get('pax')?.invalid">
      </div>

      <div class="form-group">
        <label>{{ t()['transfer.colPrice'] || 'Price' }} *</label>
        <input type="number" formControlName="price" [class.error]="priceForm.get('price')?.touched && priceForm.get('price')?.invalid">
      </div>

      @if (errorMessage()) {
        <div style="color: #e53e3e; background: #fff5f5; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: 600; margin-bottom: 16px; border: 1px solid #fed7d7; text-align: center;">
          <i class="fa-solid fa-circle-exclamation"></i> {{ errorMessage() }}
        </div>
      }

      <div class="modal-actions mt-4">
        <button type="button" class="btn btn-cancel" (click)="onCancel()">
          <i class="fa-solid fa-xmark"></i> {{ t()['user.btnCancel'] || 'Cancel' }}
        </button>
        <button type="submit" class="btn btn-save">
          <i class="fa-solid fa-save"></i> {{ t()['transfer.btnSavePrice'] || 'Save Price' }}
        </button>
      </div>
    </form>
  </div>
</div>
}
