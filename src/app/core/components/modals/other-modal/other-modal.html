<div class="modal-overlay" (click)="close.emit()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ initialData() ? 'Edit Service' : t()['form.addOther'] }}</h2>
      <button class="btn-close" (click)="close.emit()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <form [formGroup]="otherForm" class="other-form">
        <div class="form-grid">
          <div class="form-group col-span-2">
            <label><i class="fa-solid fa-clipboard-list text-teal"></i> {{ t()['form.description'] }} *</label>
            <input type="text" formControlName="description" placeholder="Description of service">
          </div>
          <div class="form-group">
            <label><i class="fa-regular fa-calendar text-teal"></i> {{ t()['form.date'] }}</label>
            <app-date-input formControlName="date" [min]="minDate()" />
          </div>

          <div class="form-group">
            <label><i class="fa-solid fa-file-invoice-dollar text-teal"></i> {{ t()['form.costThb'] }}</label>
            <input type="number" min="0" formControlName="cost">
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-money-bill-wave text-teal"></i> {{ t()['form.totalPrice'] }} *</label>
            <input type="number" min="0" formControlName="totalPrice" class="input-yellow">
          </div>
          <div></div>

          <div class="form-group full-width">
            <label><i class="fa-solid fa-comment text-teal"></i> {{ t()['form.remarks'] }}</label>
            <textarea formControlName="remarks" rows="3" placeholder="Additional remarks"></textarea>
          </div>
        </div>
      </form>
      @if (errorMessage()) {
        <div style="color: #e53e3e; background: #fff5f5; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: 600; margin-top: 16px; border: 1px solid #fed7d7; text-align: center;">
          <i class="fa-solid fa-circle-exclamation"></i> {{ errorMessage() }}
        </div>
      }
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" (click)="close.emit()">{{ t()['form.cancel'] }}</button>
      <button class="btn-save bg-teal" (click)="onSave()">{{ initialData() ? 'Update Service' : t()['form.save'] }}</button>
    </div>
  </div>
</div>
