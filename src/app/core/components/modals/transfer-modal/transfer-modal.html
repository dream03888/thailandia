<div class="modal-overlay" (click)="close.emit()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ t()['form.addTransfer'] }}</h2>
      <button class="btn-close" (click)="close.emit()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <form [formGroup]="transferForm" class="transfer-form">
        <div class="form-grid">
          <!-- Row 1 -->
          <div class="form-group">
            <label><i class="fa-solid fa-globe text-teal"></i> {{ t()['form.country'] }} *</label>
            <select formControlName="country">
              <option value="Thailand">Thailand</option>
            </select>
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-city text-teal"></i> {{ t()['form.city'] }} *</label>
            <select formControlName="city">
              <option value="">Select city</option>
              @for (city of masterData.cities(); track city) {
                <option [value]="city">{{ city }}</option>
              }
            </select>
          </div>
          <div class="form-group">
            <label><i class="fa-regular fa-calendar text-teal"></i> {{ t()['form.date'] }} *</label>
            <input type="date" formControlName="date">
          </div>

          <!-- Row 2 -->
          <div class="form-group">
            <label><i class="fa-solid fa-bus text-teal"></i> {{ t()['form.transfer'] }} *</label>
            <select formControlName="transfer">
              <option value="">Select Transfer</option>
              @for (t of filteredTransfers(); track t.id) {
                <option [value]="t.id">{{ t.transfer_type }}</option>
              }
            </select>
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-location-dot text-teal"></i> {{ t()['form.from'] }}</label>
            <input type="text" formControlName="from" placeholder="Enter origin">
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-location-dot text-teal"></i> {{ t()['form.to'] }}</label>
            <input type="text" formControlName="to" placeholder="Enter destination">
          </div>

          <!-- Row 3 -->
          <div class="form-group">
            <label><i class="fa-solid fa-plane text-teal"></i> {{ t()['form.flight'] }}</label>
            <input type="text" formControlName="flight" placeholder="Flight details">
          </div>
          <div class="form-group">
            <label><i class="fa-regular fa-clock text-teal"></i> {{ t()['form.flightTime'] }}</label>
            <input type="time" formControlName="flightTime">
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-users text-teal"></i> {{ t()['form.tot'] }} *</label>
            <select formControlName="tot">
              <option value="">Select ToT</option>
              <option value="PVT">PVT</option>
              <option value="SIC">SIC</option>
            </select>
          </div>

          <!-- Row 4 -->
          <div class="form-group">
            <label><i class="fa-regular fa-clock text-teal"></i> {{ t()['form.pickupTime'] }}</label>
            <input type="time" formControlName="pickupTime">
          </div>
          <div class="form-group price-group">
            <label>{{ t()['form.updatedTransferPrice'] }}</label>
            <div class="price-input-action">
              <input type="text" formControlName="price" class="bg-light-grey" readonly>
              <button type="button" class="btn-get-price bg-teal" (click)="getPrice()">
                <i class="fa-solid fa-money-bill"></i> {{ t()['form.getPrice'] }}
              </button>
            </div>
          </div>
          <div></div>

          <!-- Row 5 -->
          <div class="form-group full-width">
            <label><i class="fa-solid fa-comment text-teal"></i> {{ t()['form.remarks'] }}</label>
            <textarea formControlName="remarks" rows="3" placeholder="Additional remarks"></textarea>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" (click)="close.emit()">{{ t()['form.cancel'] }}</button>
      <button class="btn-save bg-teal" [disabled]="transferForm.invalid" (click)="onSave()">{{ t()['form.save'] }}</button>
    </div>
  </div>
</div>
