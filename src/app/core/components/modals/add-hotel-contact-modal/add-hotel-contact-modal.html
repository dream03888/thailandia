<div class="modal-overlay" [class.show]="isOpen">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title"><i class="fa-solid fa-address-book"></i> {{ editIndex !== null ? t()['hotel.editContact'] || 'Edit Contact' : t()['hotel.addContact'] || 'Add Contact' }}</h2>
      <button type="button" class="btn-close" (click)="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    
    <div class="modal-body">
      <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>{{ t()['hotel.col.name'] || 'Name' }} <span class="required">*</span></label>
          <input type="text" formControlName="name" class="form-control" placeholder="Enter contact name">
        </div>
        
        <div class="form-group">
          <label>{{ t()['hotel.col.email'] || 'Email' }}</label>
          <input type="email" formControlName="email" class="form-control" placeholder="Enter email address">
        </div>

        <div class="form-group">
          <label>{{ t()['hotel.col.telephone'] || 'Telephone' }}</label>
          <input type="text" formControlName="telephone" class="form-control" placeholder="Enter telephone number">
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline" (click)="closeModal()">{{ t()['excursion.btnCancel'] || 'Cancel' }}</button>
          <button type="submit" class="btn btn-primary" [disabled]="contactForm.invalid">{{ editIndex !== null ? (t()['hotel.btnUpdate'] || 'Update') : (t()['hotel.btnActionAdd'] || 'Add') }}</button>
        </div>
      </form>
    </div>
  </div>
</div>
