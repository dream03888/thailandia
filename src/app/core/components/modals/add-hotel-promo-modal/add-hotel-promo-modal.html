<div class="modal-overlay" [class.show]="isOpen">
  <div class="modal-content" style="max-width: 560px;">
    <div class="modal-header">
      <h2 class="modal-title"><i class="fa-solid fa-tag"></i> Add Promotion Details</h2>
      <button type="button" class="btn-close" (click)="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <div class="modal-body">
      <form [formGroup]="promoForm" (ngSubmit)="onSubmit()">

        <!-- Code & Name -->
        <div class="form-row">
          <div class="form-group flex-1">
            <label>{{ t()['hotel.col.code'] || 'Code' }} <span class="required">*</span></label>
            <input type="text" formControlName="code" class="form-control" placeholder="*Code">
          </div>
          <div class="form-group flex-1">
            <label>{{ t()['hotel.col.promoName'] || 'Name' }} <span class="required">*</span></label>
            <input type="text" formControlName="name" class="form-control" placeholder="*Name">
          </div>
        </div>

        <!-- Booking Dates -->
        <div class="form-row">
          <div class="form-group flex-1">
            <label>{{ t()['hotel.col.bookingFrom'] || 'Booking Date From' }} <span class="required">*</span></label>
            <input type="date" formControlName="bookingDateFrom" class="form-control">
          </div>
          <div class="form-group flex-1">
            <label>{{ t()['hotel.col.bookingTo'] || 'Booking Date To' }} <span class="required">*</span></label>
            <input type="date" formControlName="bookingDateTo" class="form-control">
          </div>
        </div>

        <!-- Early Bird & Min Nights -->
        <div class="form-row">
          <div class="form-group flex-1">
            <label>{{ t()['hotel.col.earlyBird'] || 'Early Bird' }}</label>
            <input type="number" min="0" formControlName="earlyBird" class="form-control" placeholder="Early Bird">
          </div>
          <div class="form-group flex-1">
            <label>{{ t()['hotel.col.minNights'] || 'Min-Nights' }}</label>
            <input type="number" min="0" formControlName="minNights" class="form-control" placeholder="Minimum Nights">
          </div>
        </div>

        <!-- Discount Amount & Type -->
        <div class="form-row">
          <div class="form-group flex-1">
            <label>Discount Amount</label>
            <input type="number" min="0" formControlName="discountAmount" class="form-control" placeholder="Discount">
          </div>
          <div class="form-group flex-1">
            <label>Discount Type</label>
            <select formControlName="discountType" class="form-control">
              <option value="%">%</option>
              <option value="fixed">Fixed Amount</option>
            </select>
          </div>
        </div>

        <!-- Checkboxes -->
        <div class="form-row checkbox-row">
          <div class="form-group flex-1 checkbox-group">
            <label class="checkbox-label">
              Valid For Extra Bed <input type="checkbox" formControlName="validForExtraBed">
            </label>
          </div>
          <div class="form-group flex-1 checkbox-group">
            <label class="checkbox-label">
              Enabled <input type="checkbox" formControlName="enabled">
            </label>
          </div>
        </div>

        <!-- Free Meals -->
        <div class="form-group">
          <label>{{ t()['hotel.col.freeMeals'] || 'Free Meals' }}</label>
          <div class="form-row compact-row" style="gap: 8px; margin-bottom: 0;">
            <input type="number" formControlName="freeMealsAbf" class="form-control" placeholder="ABF">
            <input type="number" formControlName="freeMealsLunch" class="form-control" placeholder="Lunch">
            <input type="number" formControlName="freeMealsDinner" class="form-control" placeholder="Dinner">
          </div>
        </div>

        <!-- Description -->
        <div class="form-group">
          <textarea formControlName="description" class="form-control" rows="3" placeholder="Description"></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline" (click)="closeModal()">Close</button>
          <button type="submit" class="btn btn-primary" [disabled]="promoForm.invalid">Save Promotion</button>
        </div>
      </form>
    </div>
  </div>
</div>
