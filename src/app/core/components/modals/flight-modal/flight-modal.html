<div class="modal-backdrop" (click)="onClose()">
  <div class="modal-dialog" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="modal-header">
      <h2 class="modal-title">{{ t()['flight.title'] }}</h2>
      <button class="btn-close" (click)="onClose()"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <!-- Body / Form -->
    <div class="modal-body">
      <form [formGroup]="flightForm" class="flight-form">
        
        <div class="form-row">
          <div class="form-group">
            <label>{{ t()['flight.flightNumber'] }} <span class="required">*</span></label>
            <input type="text" formControlName="flightNumber">
          </div>
          <div class="form-group">
            <label>{{ t()['flight.airline'] }} <span class="required">*</span></label>
            <input type="text" formControlName="airline">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>{{ t()['flight.type'] }} <span class="required">*</span></label>
            <select formControlName="flightType">
              <option value="international">{{ t()['flight.international'] }}</option>
              <option value="domestic">{{ t()['flight.domestic'] }}</option>
            </select>
          </div>
          <div class="form-group">
            <label>{{ t()['flight.date'] }} <span class="required">*</span></label>
            <input type="date" formControlName="date">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>{{ t()['flight.departureTime'] }} <span class="required">*</span></label>
            <input type="time" formControlName="departureTime">
          </div>
          <div class="form-group">
            <label>{{ t()['flight.arrivalTime'] }} <span class="required">*</span></label>
            <input type="time" formControlName="arrivalTime">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>{{ t()['flight.pnr'] }}</label>
            <input type="text" formControlName="pnr">
          </div>
          <div class="form-group">
            <label>{{ t()['flight.ticketNumber'] }}</label>
            <input type="text" formControlName="ticketNumber">
          </div>
          <div class="form-group">
            <label>{{ t()['flight.cost'] }}</label>
            <input type="number" formControlName="cost">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group full-width">
            <label>{{ t()['flight.remarks'] }}</label>
            <textarea formControlName="remarks" rows="2"></textarea>
          </div>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button type="button" class="btn-cancel" (click)="onClose()">{{ t()['form.cancel'] }}</button>
      <button type="button" class="btn-save" [disabled]="flightForm.invalid" (click)="onSave()">{{ t()['form.save'] }}</button>
    </div>
  </div>
</div>
