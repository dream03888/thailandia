<div class="modal-backdrop" (click)="onClose()">
  <div class="modal-dialog" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="modal-header">
      <h2 class="modal-title">{{ t()['form.addFlight'] }}</h2>
      <button class="btn-close" (click)="onClose()"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <!-- Body / Form -->
    <div class="modal-body">
      <form [formGroup]="flightForm" class="flight-form">
        <div class="form-grid">
          <div class="form-group">
            <label><i class="fa-solid fa-plane text-teal"></i> {{ t()['form.flight'] }}</label>
            <input type="text" formControlName="flight" placeholder="Flight">
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-hashtag text-teal"></i> {{ t()['form.flightNumber'] }}</label>
            <input type="text" formControlName="number" placeholder="Number">
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-right-left text-teal"></i> {{ t()['form.flightInOut'] }}</label>
            <select formControlName="flightInOut">
              <option value="">Select</option>
              <option value="in">In</option>
              <option value="out">Out</option>
            </select>
          </div>

          <div class="form-group">
            <label><i class="fa-solid fa-route text-teal"></i> {{ t()['form.route'] }}</label>
            <input type="text" formControlName="route" placeholder="Route">
          </div>
          <div class="form-group">
            <label><i class="fa-regular fa-calendar text-teal"></i> {{ t()['form.dateOfTravel'] }}</label>
            <div class="input-with-icon">
              <input type="date" formControlName="dateOfTravel">
            </div>
          </div>
          <div class="form-group">
            <label><i class="fa-regular fa-clock text-teal"></i> {{ t()['form.departureTime'] }}</label>
            <div class="input-with-icon">
              <input type="time" formControlName="departureTime">
            </div>
          </div>

          <div class="form-group highlighted-border">
            <label><i class="fa-regular fa-clock text-teal"></i> {{ t()['form.arrivalTime'] }}</label>
            <div class="input-with-icon">
              <input type="time" formControlName="arrivalTime">
            </div>
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-user-pen text-teal"></i> {{ t()['form.issuedBy'] }}</label>
            <input type="text" formControlName="issuedBy" placeholder="Issued By">
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-dollar-sign text-teal"></i> {{ t()['form.costThb'] }}</label>
            <input type="number" min="0" formControlName="cost" class="input-yellow" placeholder="Enter flight cost">
          </div>

          <div class="form-group full-width">
            <label><i class="fa-solid fa-comment text-teal"></i> {{ t()['form.remarks'] }}</label>
            <textarea formControlName="remarks" rows="3" placeholder="Enter remarks"></textarea>
          </div>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button type="button" class="btn-cancel" (click)="onClose()">Close</button>
      <button type="button" class="btn-save bg-teal" [disabled]="flightForm.invalid" (click)="onSave()">Save Flight</button>
    </div>
  </div>
</div>
